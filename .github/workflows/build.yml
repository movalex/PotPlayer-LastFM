name: Build and Release

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build PotPlayerControl dependency
        run: |
          git clone --depth 1 https://github.com/ld3l/PotPlayerControl.git /tmp/PotPlayerControl
          cd /tmp/PotPlayerControl
          mvn package -q -DskipTests
          mkdir -p $GITHUB_WORKSPACE/lib
          cp target/potplayercontrol-1.0.1.jar $GITHUB_WORKSPACE/lib/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: gradle build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PotPlayer-LastFM
          path: build/libs/PotPlayer-LastFM-*.jar

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build PotPlayerControl dependency
        run: |
          git clone --depth 1 https://github.com/ld3l/PotPlayerControl.git /tmp/PotPlayerControl
          cd /tmp/PotPlayerControl
          mvn package -q -DskipTests
          mkdir -p $GITHUB_WORKSPACE/lib
          cp target/potplayercontrol-1.0.1.jar $GITHUB_WORKSPACE/lib/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: gradle build

      - name: Generate checksums
        run: |
          cd build/libs
          sha256sum PotPlayer-LastFM-*.jar > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/libs/PotPlayer-LastFM-*.jar
            build/libs/SHA256SUMS.txt
          generate_release_notes: true
